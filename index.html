<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5/18 午餐會 座位表</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #F4F1EC;
  --wood: #C8A97A;
  --wood-dark: #A07850;
  --wood-light: #E2CDA8;
  --surface: #FDFAF5;
  --border: #DDD5C4;
  --text: #2A2218;
  --text-muted: #8A7D6A;
  --shadow: 0 2px 12px rgba(42,34,24,0.10);
  --radius: 12px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.title {
  font-size: 17px;
  font-weight: 700;
}

.subtitle {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  margin-top: 2px;
}

.btn {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
}

.btn:hover {
  background: var(--bg);
}

.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 20px;
}

.room {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.room-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 20px;
}

.conference-table {
  background: linear-gradient(135deg, var(--wood-light) 0%, var(--wood) 50%, var(--wood-dark) 100%);
  border-radius: 20px;
  padding: 20px 32px;
  margin: 0 auto;
  box-shadow: 0 6px 24px rgba(120,80,30,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative;
}

.conference-table::before {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 17px;
  border: 1px solid rgba(255,255,255,0.2);
  pointer-events: none;
}

.table-label {
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.6);
  margin-bottom: 12px;
  font-family: 'DM Mono', monospace;
}

.team-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 8px 0;
}

.team-row + .team-row {
  margin-top: 16px;
}

.seats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  flex: 1;
}

.seat {
  background: white;
  border-radius: 10px;
  padding: 8px 10px;
  min-width: 110px;
  max-width: 140px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  position: relative;
  user-select: none;
  border: 2px solid transparent;
}

.seat:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.18);
}

.seat.dragging {
  opacity: 0.4;
  transform: scale(0.96);
  cursor: grabbing;
}

.seat.drag-over {
  border-color: var(--wood);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(120,80,30,0.25);
}

.seat-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.seat-meal {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}

.seat-note {
  font-size: 9px;
  color: #aaa;
  margin-top: 2px;
}

.status-buttons {
  display: flex;
  gap: 4px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.status-btn {
  border: none;
  border-radius: 6px;
  padding: 3px 6px;
  font-size: 10px;
  cursor: pointer;
  background: #eee;
  color: #333;
}

.status-btn.active {
  background: #A07850;
  color: white;
}

.seat-empty {
  background: rgba(255,255,255,0.15);
  border: 2px dashed rgba(255,255,255,0.3);
  border-radius: 10px;
  min-width: 100px;
  max-width: 130px;
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  cursor: default;
}

.table-divider {
  height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 14px 0;
}

.bench {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
}

.bench-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.bench-seats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  min-height: 80px;
}

.bench-seats .seat {
  background: var(--bg);
}

.bench-seats.drag-over-zone {
  background: #EEF7EE;
  border-radius: 8px;
}

.hint {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 12px;
  font-style: italic;
}
</style>
</head>

<body>

<header>
  <div>
    <div class="title">5/18 午餐會 座位表</div>
    <div class="subtitle">曾獻瑩議員辦公室 · 大會議室</div>
  </div>

  <div style="display:flex;gap:8px;">
    <button class="btn" onclick="resetSeats()">重置座位</button>
    <button class="btn" onclick="printPage()">列印</button>
  </div>
</header>

<div class="main">

  <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">
    拖曳卡片可調整座位
  </div>

  <div class="room">

    <div class="room-label">五樓第三會議室</div>

    <div class="conference-table">

      <div class="table-label">— 大 會 議 桌 —</div>

      <div class="team-row">
        <div class="seats" id="row-a"></div>
      </div>

      <div class="table-divider"></div>

      <div class="team-row">
        <div class="seats" id="row-b"></div>
      </div>

    </div>

    <div class="hint">
      拖曳卡片到對面那排，或放到「候補區」暫存
    </div>

  </div>

  <div class="bench">

    <div class="bench-label">候補 / 暫存區</div>

    <div class="bench-seats" id="bench"></div>

  </div>

</div>

<script>
const STORAGE_KEY = 'seating-0518-v1';

const DEFAULT = {
  a: [
    {id:'s1', name:'秀華', meal:'海南雞', note:'', status:'出席'},
    {id:'s2', name:'雅雯', meal:'海南雞', note:'', status:'出席'},
    {id:'s3', name:'林湛', meal:'胭脂肉', note:'', status:'出席'},
    {id:'s4', name:'冠禎', meal:'', note:'', status:'出席'},
  ],

  b: [
    {id:'s5', name:'彥漢', meal:'脆皮雞', note:'', status:'出席'},
    {id:'s6', name:'豪雷', meal:'', note:'', status:'出席'},
    {id:'s7', name:'天維', meal:'', note:'', status:'出席'},
    {id:'s8', name:'銓興哥', meal:'海南雞', note:'', status:'出席'},
    {id:'s9', name:'吉昇', meal:'', note:'', status:'出席'},
  ],

  bench: []
};

let state;

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT));
  } catch(e) {
    return JSON.parse(JSON.stringify(DEFAULT));
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function resetSeats() {
  if (confirm('確定重置為預設座位？')) {
    state = JSON.parse(JSON.stringify(DEFAULT));
    saveState();
    render();
  }
}

function printPage() {
  window.print();
}

function setStatus(id, status) {
  for (const row of ['a','b','bench']) {
    const person = state[row].find(x => x.id === id);

    if (person) {
      person.status = status;
      break;
    }
  }

  saveState();
  render();
}

let dragId = null;

function makeSeatEl(p, rowId) {

  const div = document.createElement('div');

  div.className = 'seat';
  div.dataset.id = p.id;
  div.dataset.row = rowId;
  div.draggable = true;

  const mealIcon = {
    海南雞:'🍗',
    脆皮雞:'🍖',
    鮮蔬咖哩:'🍛',
    胭脂肉:'🥩'
  }[p.meal] || '';

  div.innerHTML = `
    <div class="seat-name">${p.name}</div>

    ${p.meal ? `
      <div class="seat-meal">${mealIcon} ${p.meal}</div>
    ` : ''}

    ${p.note ? `
      <div class="seat-note">${p.note}</div>
    ` : ''}

    <div class="status-buttons">

      <button
        class="status-btn ${p.status === '出席' ? 'active' : ''}"
        onclick="event.stopPropagation(); setStatus('${p.id}','出席')">
        出席
      </button>

      <button
        class="status-btn ${p.status === '缺席' ? 'active' : ''}"
        onclick="event.stopPropagation(); setStatus('${p.id}','缺席')">
        缺席
      </button>

      <button
        class="status-btn ${p.status === '固定缺席' ? 'active' : ''}"
        onclick="event.stopPropagation(); setStatus('${p.id}','固定缺席')">
        固定缺席
      </button>

    </div>
  `;

  div.addEventListener('dragstart', e => {
    dragId = p.id;

    setTimeout(() => {
      div.classList.add('dragging');
    }, 0);

    e.dataTransfer.effectAllowed = 'move';
  });

  div.addEventListener('dragend', () => {

    div.classList.remove('dragging');

    document.querySelectorAll('.drag-over, .drag-over-zone')
      .forEach(el => {
        el.classList.remove('drag-over', 'drag-over-zone');
      });
  });

  div.addEventListener('dragover', e => {
    e.preventDefault();

    if (div.dataset.id !== dragId) {
      div.classList.add('drag-over');
    }
  });

  div.addEventListener('dragleave', () => {
    div.classList.remove('drag-over');
  });

  div.addEventListener('drop', e => {

    e.preventDefault();

    div.classList.remove('drag-over');

    if (!dragId || dragId === p.id) return;

    let fromItem = null;
    let toItem = null;

    let fromRowArr = null;
    let toRowArr = null;

    for (const row of ['a','b','bench']) {

      const idx = state[row].findIndex(x => x.id === dragId);

      if (idx !== -1) {
        fromItem = state[row][idx];
        fromRowArr = row;
      }

      const idx2 = state[row].findIndex(x => x.id === p.id);

      if (idx2 !== -1) {
        toItem = state[row][idx2];
        toRowArr = row;
      }
    }

    if (!fromItem || !toItem) return;

    const fi = state[fromRowArr].indexOf(fromItem);
    const ti = state[toRowArr].indexOf(toItem);

    if (fromRowArr === toRowArr) {

      state[fromRowArr].splice(fi, 1);

      state[fromRowArr].splice(
        fi < ti ? ti - 1 : ti,
        0,
        fromItem
      );

    } else {

      state[fromRowArr].splice(fi, 1, toItem);

      state[toRowArr].splice(ti, 1, fromItem);
    }

    saveState();
    render();
  });

  return div;
}

function makeDropZone(rowId) {

  const zone = document.getElementById(
    rowId === 'bench' ? 'bench' : `row-${rowId}`
  );

  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('drag-over-zone');
  });

  zone.addEventListener('dragleave', e => {

    if (!zone.contains(e.relatedTarget)) {
      zone.classList.remove('drag-over-zone');
    }
  });

  zone.addEventListener('drop', e => {

    e.preventDefault();

    zone.classList.remove('drag-over-zone');

    if (!dragId) return;

    let fromRowArr = null;
    let fi = -1;

    for (const row of ['a','b','bench']) {

      const idx = state[row].findIndex(x => x.id === dragId);

      if (idx !== -1) {
        fromRowArr = row;
        fi = idx;
        break;
      }
    }

    if (!fromRowArr || fi === -1) return;

    if (fromRowArr === rowId) return;

    const item = state[fromRowArr].splice(fi, 1)[0];

    state[rowId].push(item);

    saveState();
    render();
  });
}

function render() {

  ['a','b'].forEach(row => {

    const el = document.getElementById(`row-${row}`);

    el.innerHTML = '';

    state[row].forEach(p => {
      el.appendChild(makeSeatEl(p, row));
    });

    if (state[row].length === 0) {

      const empty = document.createElement('div');

      empty.className = 'seat-empty';
      empty.textContent = '空位';

      el.appendChild(empty);
    }

    makeDropZone(row);
  });

  const bench = document.getElementById('bench');

  bench.innerHTML = '';

  state.bench.forEach(p => {
    bench.appendChild(makeSeatEl(p, 'bench'));
  });

  if (state.bench.length === 0) {

    bench.innerHTML = `
      <div style="font-size:12px;color:#bbb;padding:8px;">
        拖曳座位到這裡暫存
      </div>
    `;
  }

  makeDropZone('bench');
}

state = loadState();
render();
</script>

<style>
@media print {

  header .btn {
    display: none;
  }

  .hint {
    display: none;
  }

  body {
    background: white;
  }

  .room,
  .bench {
    box-shadow: none;
    border: 1px solid #ccc;
  }
}
</style>

</body>
</html>
