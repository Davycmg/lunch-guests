<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>午餐會 來賓管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#F7F5F0;--surface:#FFFFFF;--border:#E5E0D8;--border-strong:#C8C0B4;
    --text:#1A1714;--text-muted:#7A7368;--text-faint:#B0A89E;
    --accent:#2C5F2E;--accent-light:#EAF2EA;
    --red:#8B2020;--red-light:#FAF0F0;
    --amber:#7A5500;--amber-light:#FDF6E3;
    --blue:#1A3A6B;--blue-light:#EEF3FB;
    --purple:#4A1D8B;--purple-light:#F0EAFB;
    --gray:#444444;--gray-light:#EEEEEE;
    --teal:#0D6E6E;--teal-light:#E0F5F5;
    --pink:#8B1A5A;--pink-light:#FAE8F3;
    --orange:#7A3500;--orange-light:#FDF0E3;
    --indigo:#2D3A8C;--indigo-light:#EAF0FB;
    --radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
  .logo-wrap{display:flex;align-items:center;gap:10px;}
  .logo-title{font-size:16px;font-weight:700;cursor:pointer;}
  .logo-title:hover{text-decoration:underline;}
  .logo-sub{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:1px;}
  .date-input{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--blue);padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);outline:none;width:80px;text-align:center;}
  .date-input:focus{border-color:var(--border-strong);background:var(--surface);}
  .sync-status{font-size:11px;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}
  .sync-ok{background:var(--accent-light);color:var(--accent);}
  .sync-err{background:var(--red-light);color:var(--red);}
  .sync-ing{background:var(--amber-light);color:var(--amber);}
  .sync-none{background:var(--bg);color:var(--text-faint);border:1px solid var(--border);}
  .header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .btn{font-family:'Noto Sans TC',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.15s;}
  .btn:hover{background:var(--bg);}.btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}.btn-primary:hover{background:#1e4420;}
  .btn-danger{color:var(--red);}
  .main{max-width:900px;margin:0 auto;padding:20px 16px;}
  .setup-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:none;}
  .setup-panel.show{display:block;}
  .setup-panel h3{font-size:13px;font-weight:700;margin-bottom:10px;}
  .setup-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .setup-row input{font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);flex:1;min-width:240px;outline:none;}
  .setup-row input:focus{border-color:var(--border-strong);}
  .stats-row{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;}
  .stat-num{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-bottom:3px;}
  .stat-label{font-size:9px;color:var(--text-muted);letter-spacing:0.03em;}
  .stat-card.coming .stat-num{color:var(--accent);}
  .stat-card.bento .stat-num{color:var(--blue);}
  .stat-card.absent .stat-num{color:var(--red);}
  .stat-card.unknown .stat-num{color:var(--amber);}
  .stat-card.asked .stat-num{color:var(--purple);}
  .stat-card.fixed .stat-num{color:var(--gray);}
  .stat-card.s-weekday .stat-num{color:var(--teal);}
  .stat-card.s-morning .stat-num{color:var(--orange);}
  .stat-card.s-rpg .stat-num{color:var(--pink);}
  .controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .filter-group{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;flex-wrap:wrap;}
  .filter-btn{font-family:'Noto Sans TC',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;border:none;border-right:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
  .filter-btn:last-child{border-right:none;}
  .filter-btn:hover{background:var(--bg);color:var(--text);}
  .filter-btn.active{background:var(--text);color:#fff;}
  .search-box{font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);width:140px;outline:none;}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--bg);font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--bg);}
  tbody tr.row-fixed{opacity:0.4;}
  td{padding:5px 10px;vertical-align:middle;font-size:13px;}
  td input[type=text],td input[type=number]{font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:3px 6px;border:1px solid transparent;border-radius:var(--radius-sm);background:transparent;color:var(--text);width:100%;outline:none;transition:all 0.15s;}
  td input[type=text]:hover,td input[type=number]:hover{border-color:var(--border);background:var(--surface);}
  td input[type=text]:focus,td input[type=number]:focus{border-color:var(--border-strong);background:var(--surface);}
  td input[type=number]{width:48px;text-align:center;}
  td input:disabled{opacity:0.3;pointer-events:none;}

  /* Status select */
  .status-select{font-family:'Noto Sans TC',sans-serif;font-size:11px;font-weight:500;padding:3px 6px;border-radius:20px;border:1px solid transparent;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;text-align:center;transition:all 0.15s;width:90px;}
  .status-select:focus{box-shadow:0 0 0 2px rgba(44,95,46,0.15);}
  .ss-coming{background:var(--accent-light);color:var(--accent);border-color:#b8d8b8;}
  .ss-absent{background:var(--red-light);color:var(--red);border-color:#f0c0c0;}
  .ss-unknown{background:var(--amber-light);color:var(--amber);border-color:#e8d090;}
  .ss-asked{background:var(--purple-light);color:var(--purple);border-color:#c8aaee;}
  .ss-fixed{background:var(--gray-light);color:var(--gray);border-color:#ccc;}
  .ss-weekday{background:var(--teal-light);color:var(--teal);border-color:#90d0d0;}
  .ss-morning{background:var(--orange-light);color:var(--orange);border-color:#e8c090;}
  .ss-rpg{background:var(--pink-light);color:var(--pink);border-color:#e0a0cc;}
  .ss-bsh{background:var(--indigo-light);color:var(--indigo);border-color:#a0b0e0;}

  .del-btn{font-size:11px;padding:2px 7px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--text-faint);cursor:pointer;transition:all 0.15s;}
  .del-btn:hover{border-color:var(--red);background:var(--red-light);color:var(--red);}
  .add-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-top:12px;}
  .add-label{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
  .add-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .add-row input,.add-row select{font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;}
  .add-row input.f-name{width:80px;}.add-row input.f-bento{width:52px;}.add-row input.f-note{width:140px;}.add-row input.f-phone{width:120px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;font-size:13px;padding:8px 16px;border-radius:var(--radius);opacity:0;pointer-events:none;transition:all 0.25s;z-index:999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .empty{text-align:center;padding:28px;color:var(--text-faint);font-size:13px;}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div>
      <div class="logo-title" onclick="toggleSetup()" title="點此設定">⚙ 午餐會 來賓管理</div>
      <div class="logo-sub">曾獻瑩議員辦公室</div>
    </div>
    <input type="text" class="date-input" id="current-date" value="5/22" onchange="updateDateLabel()" title="點此修改日期">
  </div>
  <div class="header-actions">
    <span class="sync-status sync-none" id="sync-status">未連線</span>
    <button class="btn" onclick="syncFromSheet()">從雲端載入</button>
    <button class="btn btn-primary" onclick="syncToSheet()">儲存到雲端</button>
    <button class="btn btn-danger" onclick="resetData()">重置</button>
    <button class="btn" onclick="copyText()">複製名單</button>
    <button class="btn" onclick="exportCSV()">匯出 CSV</button>
  </div>
</header>

<div class="main">
  <div class="setup-panel" id="setup-panel">
    <h3>⚙ Google Sheets 連線設定</h3>
    <div class="setup-row">
      <input type="text" id="gas-url" placeholder="貼上 Google Apps Script 部署網址">
      <button class="btn btn-primary" onclick="saveGasUrl()">儲存設定</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card coming"><div class="stat-num" id="s-coming">0</div><div class="stat-label">出席</div></div>
    <div class="stat-card bento"><div class="stat-num" id="s-bento">0</div><div class="stat-label">便當</div></div>
    <div class="stat-card absent"><div class="stat-num" id="s-absent">0</div><div class="stat-label">缺席</div></div>
    <div class="stat-card unknown"><div class="stat-num" id="s-unknown">0</div><div class="stat-label">待確認</div></div>
    <div class="stat-card asked"><div class="stat-num" id="s-asked">0</div><div class="stat-label">已詢問</div></div>
    <div class="stat-card fixed"><div class="stat-num" id="s-fixed">0</div><div class="stat-label">固定缺席</div></div>
    <div class="stat-card s-weekday"><div class="stat-num" id="s-weekday">0</div><div class="stat-label">職場主日</div></div>
    <div class="stat-card s-morning"><div class="stat-num" id="s-morning">0</div><div class="stat-label">晨禱</div></div>
    <div class="stat-card s-rpg"><div class="stat-num" id="s-rpg">0</div><div class="stat-label">RPG/BSH</div></div>
  </div>

  <div class="controls">
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('出席',this)">出席</button>
      <button class="filter-btn" onclick="setFilter('缺席',this)">缺席</button>
      <button class="filter-btn" onclick="setFilter('待確認',this)">待確認</button>
      <button class="filter-btn" onclick="setFilter('已詢問',this)">已詢問</button>
      <button class="filter-btn" onclick="setFilter('固定缺席',this)">固定缺席</button>
      <button class="filter-btn" onclick="setFilter('職場主日',this)">職場主日</button>
      <button class="filter-btn" onclick="setFilter('晨禱',this)">晨禱</button>
      <button class="filter-btn" onclick="setFilter('RPG',this)">RPG</button>
      <button class="filter-btn" onclick="setFilter('BSH',this)">BSH</button>
    </div>
    <input type="text" class="search-box" id="search" placeholder="搜尋姓名 / 備註..." oninput="render()">
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th style="width:92px;">姓名</th>
        <th style="width:108px;" id="th-status">5/22 狀態</th>
        <th style="width:46px;">便當</th>
        <th>備註</th>
        <th style="width:108px;">電話</th>
        <th style="width:42px;"></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="add-section">
    <div class="add-label">新增來賓</div>
    <div class="add-row">
      <input class="f-name" type="text" id="n-name" placeholder="姓名">
      <select id="n-status">
        <option value="出席">出席</option>
        <option value="待確認" selected>待確認</option>
        <option value="已詢問">已詢問</option>
        <option value="缺席">缺席</option>
        <option value="固定缺席">固定缺席</option>
        <option value="職場主日">職場主日</option>
        <option value="晨禱">晨禱</option>
        <option value="RPG">RPG</option>
        <option value="BSH">BSH</option>
      </select>
      <input class="f-bento" type="number" id="n-bento" value="1" min="0" max="20">
      <input class="f-note" type="text" id="n-note" placeholder="備註">
      <input class="f-phone" type="text" id="n-phone" placeholder="電話">
      <button class="btn btn-primary" onclick="addPerson()">新增</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LOCAL_KEY='lunch-guests-v7';
const GAS_KEY='lunch-gas-url';
const DATE_KEY='lunch-current-date';
const HARDCODED_GAS_URL='https://script.google.com/macros/s/AKfycbxkc7ixGzBxrE5Mo90oELhquakCbSQXlV6SEwemMlYcpCtF-Py5C9_9clyyKnxpYxK2uQ/exec';

const ALL_STATUSES=['出席','缺席','待確認','已詢問','固定缺席','職場主日','晨禱','RPG','BSH'];

const STATUS_CLASS={
  '出席':'ss-coming','缺席':'ss-absent','待確認':'ss-unknown','已詢問':'ss-asked',
  '固定缺席':'ss-fixed','職場主日':'ss-weekday','晨禱':'ss-morning','RPG':'ss-rpg','BSH':'ss-bsh'
};

const CAN_BENTO=new Set(['出席','職場主日','晨禱','RPG','BSH']);

const DEFAULT_GUESTS=[
  {name:"彥漢8872",status:"缺席",    bento:0,note:"脆皮雞",   phone:"0920-856-700"},
  {name:"秀華",    status:"出席",    bento:1,note:"腿庫",     phone:""},
  {name:"雅雯4997",status:"出席",    bento:1,note:"",         phone:""},
  {name:"豪雷",    status:"缺席",    bento:0,note:"",         phone:""},
  {name:"天維",    status:"出席",    bento:0,note:"",         phone:""},
  {name:"銓興哥",  status:"出席",    bento:0,note:"",         phone:""},
  {name:"林湛",    status:"出席",    bento:1,note:"腿庫",     phone:""},
  {name:"關崇仁",  status:"出席",    bento:1,note:"腿庫",     phone:""},
  {name:"吉昇",    status:"缺席",    bento:0,note:"",         phone:""},
  {name:"莊敬",    status:"缺席",    bento:0,note:"",         phone:""},
  {name:"美玲",    status:"待確認",  bento:0,note:"",         phone:""},
  {name:"佳頤",    status:"待確認",  bento:0,note:"",         phone:""},
  {name:"冠禎",    status:"待確認",  bento:0,note:"",         phone:""},
  {name:"宗諺",    status:"固定缺席",bento:0,note:"",         phone:""},
  {name:"懿恬",    status:"固定缺席",bento:0,note:"",         phone:""},
  {name:"閔翔",    status:"固定缺席",bento:0,note:"",         phone:""},
  {name:"鴻華",    status:"固定缺席",bento:0,note:"",         phone:""},
  {name:"政宏",    status:"缺席",    bento:0,note:"",         phone:""},
  {name:"黎大哥",  status:"缺席",    bento:0,note:"",         phone:""},
  {name:"大衛",    status:"出席",    bento:1,note:"烤魚",     phone:""},
  {name:"麗文8815",status:"出席",    bento:1,note:"腿庫麵",   phone:""},
  {name:"守愚",    status:"固定缺席",bento:0,note:"",         phone:""},
  {name:"欣美姐",  status:"缺席",    bento:0,note:"",         phone:""},
  {name:"俊維",    status:"缺席",    bento:0,note:"隔週值班", phone:""},
  {name:"家銘",    status:"缺席",    bento:0,note:"",         phone:""},
  {name:"世德",    status:"固定缺席",bento:0,note:"當兵",     phone:""},
  {name:"士斌",    status:"固定缺席",bento:0,note:"放療",     phone:""},
  {name:"Cindy姐", status:"出席",    bento:0,note:"",         phone:""},
  {name:"淑慧",    status:"固定缺席",bento:0,note:"",         phone:""},
  {name:"顏志龍",  status:"出席",    bento:1,note:"烤魚",     phone:""},
];

let guests=[],curFilter='all',gasUrl='';

function init(){
  gasUrl=localStorage.getItem(GAS_KEY)||HARDCODED_GAS_URL;
  document.getElementById('gas-url').value=gasUrl;
  const savedDate=localStorage.getItem(DATE_KEY);
  if(savedDate)document.getElementById('current-date').value=savedDate;
  updateDateLabel();
  syncFromSheet(true);
}

function updateDateLabel(){
  const d=document.getElementById('current-date').value.trim();
  localStorage.setItem(DATE_KEY,d);
  document.getElementById('th-status').textContent=d+' 狀態';
}

function saveLocal(){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(guests));}catch(e){}}

let autoSyncTimer=null;
function scheduleAutoSync(){
  if(!gasUrl)return;
  clearTimeout(autoSyncTimer);
  setSyncStatus('ing','等待同步...');
  autoSyncTimer=setTimeout(()=>syncToSheet(true),1500);
}

function saveGasUrl(){
  const val=document.getElementById('gas-url').value.trim();
  if(!val){showToast('請輸入網址');return;}
  gasUrl=val;localStorage.setItem(GAS_KEY,gasUrl);
  setSyncStatus('ok','已儲存');showToast('GAS 網址已儲存');
  document.getElementById('setup-panel').classList.remove('show');
}
function toggleSetup(){document.getElementById('setup-panel').classList.toggle('show');}

function setSyncStatus(type,msg){
  const el=document.getElementById('sync-status');
  el.className='sync-status sync-'+type;el.textContent=msg;
}

async function syncFromSheet(silent=false){
  if(!gasUrl){if(!silent)showToast('請先設定 GAS 網址');return;}
  setSyncStatus('ing','載入中...');
  try{
    const res=await fetch(gasUrl+'?action=read');
    const data=await res.json();
    if(data.ok&&data.guests.length>0){
      guests=data.guests;saveLocal();render();
      setSyncStatus('ok','✓ 已同步');
      if(!silent)showToast('載入成功，共 '+guests.length+' 人');
    }else{
      loadLocal();render();setSyncStatus('ok','雲端無資料');
      if(!silent)showToast('雲端目前沒有資料');
    }
  }catch(e){loadLocal();render();setSyncStatus('err','同步失敗');if(!silent)showToast('載入失敗');}
}

function loadLocal(){
  try{const s=localStorage.getItem(LOCAL_KEY);guests=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_GUESTS));}
  catch(e){guests=JSON.parse(JSON.stringify(DEFAULT_GUESTS));}
}

async function syncToSheet(silent=false){
  if(!gasUrl){if(!silent)showToast('請先設定 GAS 網址');return;}
  setSyncStatus('ing','同步中...');
  try{
    const res=await fetch(gasUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'write',guests})});
    const data=await res.json();
    if(data.ok){setSyncStatus('ok','✓ 已同步');if(!silent)showToast('已儲存（'+data.count+' 人）');}
    else throw new Error(data.error);
  }catch(e){setSyncStatus('err','同步失敗');if(!silent)showToast('儲存失敗：'+e.message);}
}

function updateStatus(i,val){
  guests[i].status=val;
  guests[i].bento=parseInt(guests[i].bento)||0;
  if(!CAN_BENTO.has(val))guests[i].bento=0;
  else if(guests[i].bento===0)guests[i].bento=1;
  saveLocal();scheduleAutoSync();render();
}

function updateField(i,field,val){
  guests[i][field]=field==='bento'?(parseInt(val)||0):val;
  saveLocal();scheduleAutoSync();updateStats();
}

function delPerson(i){
  if(confirm('確定刪除「'+guests[i].name+'」？')){
    guests.splice(i,1);saveLocal();scheduleAutoSync();render();
  }
}

function addPerson(){
  const name=document.getElementById('n-name').value.trim();
  if(!name){showToast('請輸入姓名');return;}
  const status=document.getElementById('n-status').value;
  const bento=CAN_BENTO.has(status)?(parseInt(document.getElementById('n-bento').value)||0):0;
  guests.push({name,status,bento,note:document.getElementById('n-note').value.trim(),phone:document.getElementById('n-phone').value.trim()});
  document.getElementById('n-name').value='';document.getElementById('n-note').value='';
  document.getElementById('n-phone').value='';document.getElementById('n-bento').value='1';
  saveLocal();scheduleAutoSync();showToast('已新增「'+name+'」');render();
}

function resetData(){
  if(confirm('確定要重置為原始名單？')){
    guests=JSON.parse(JSON.stringify(DEFAULT_GUESTS));
    saveLocal();scheduleAutoSync();render();showToast('已重置');
  }
}

function setFilter(f,el){
  curFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');render();
}

function updateStats(){
  const coming=guests.filter(g=>g.status==='出席');
  document.getElementById('s-coming').textContent=coming.length;
  document.getElementById('s-bento').textContent=coming.reduce((a,g)=>a+(parseInt(g.bento)||0),0);
  document.getElementById('s-absent').textContent=guests.filter(g=>g.status==='缺席').length;
  document.getElementById('s-unknown').textContent=guests.filter(g=>g.status==='待確認').length;
  document.getElementById('s-asked').textContent=guests.filter(g=>g.status==='已詢問').length;
  document.getElementById('s-fixed').textContent=guests.filter(g=>g.status==='固定缺席').length;
  document.getElementById('s-weekday').textContent=guests.filter(g=>g.status==='職場主日').length;
  document.getElementById('s-morning').textContent=guests.filter(g=>g.status==='晨禱').length;
  document.getElementById('s-rpg').textContent=guests.filter(g=>g.status==='RPG'||g.status==='BSH').length;
}

function makeStatusSelect(ri,current){
  const sc=STATUS_CLASS[current]||'ss-unknown';
  const opts=ALL_STATUSES.map(s=>'<option value="'+s+'"'+(s===current?' selected':'')+'>'+s+'</option>').join('');
  return '<select class="status-select '+sc+'" onchange="updateStatus('+ri+',this.value);this.className=\'status-select \'+(window.STATUS_CLASS[this.value]||\'ss-unknown\')">'+opts+'</select>';
}

function render(){
  updateStats();
  const q=document.getElementById('search').value.trim().toLowerCase();
  let list=guests.map((g,i)=>({...g,_i:i}));
  if(curFilter!=='all')list=list.filter(g=>g.status===curFilter);
  if(q)list=list.filter(g=>g.name.toLowerCase().includes(q)||g.note.toLowerCase().includes(q));
  const tb=document.getElementById('tbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="6" class="empty">沒有符合條件的來賓</td></tr>';return;}
  tb.innerHTML=list.map(g=>{
    const ri=g._i,isFixed=g.status==='固定缺席';
    const canBento=CAN_BENTO.has(g.status);
    return '<tr class="'+(isFixed?'row-fixed':'')+'">'+
      '<td><input type="text" value="'+esc(g.name)+'" onchange="updateField('+ri+',\'name\',this.value)"></td>'+
      '<td>'+makeStatusSelect(ri,g.status)+'</td>'+
      '<td><input type="number" value="'+(parseInt(g.bento)||0)+'" min="0" max="20" onchange="updateField('+ri+',\'bento\',this.value)"'+(canBento?'':' disabled')+' ></td>'+
      '<td><input type="text" value="'+esc(g.note)+'" onchange="updateField('+ri+',\'note\',this.value)"></td>'+
      '<td><input type="text" value="'+esc(g.phone)+'" onchange="updateField('+ri+',\'phone\',this.value)"></td>'+
      '<td><button class="del-btn" onclick="delPerson('+ri+')">刪除</button></td>'+
      '</tr>';
  }).join('');
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function getDate(){return document.getElementById('current-date').value.trim()||'午餐會';}

function exportCSV(){
  const d=getDate();
  const bom='\uFEFF',hdr='姓名,狀態,便當,備註,電話\n';
  const rows=guests.map(g=>'"'+[g.name,g.status,parseInt(g.bento)||0,g.note,g.phone].join('","')+'"').join('\n');
  const blob=new Blob([bom+hdr+rows],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='午餐會來賓名單_'+d.replace('/','_')+'.csv';a.click();
  showToast('CSV 匯出成功');
}

function copyText(){
  const d=getDate();
  const g2=s=>guests.filter(g=>g.status===s);
  const coming=g2('出席'),bento=coming.reduce((a,g)=>a+(parseInt(g.bento)||0),0);
  const grps=[['已詢問'],['待確認'],['缺席'],['固定缺席'],['職場主日'],['晨禱'],['RPG'],['BSH']];
  let txt=d+' 午餐會來賓名單\n'+'─'.repeat(24)+'\n';
  txt+='【出席 '+coming.length+' 人 ／ 便當 '+bento+' 個】\n';
  txt+=coming.map(g=>'• '+g.name+(parseInt(g.bento)>1?'（便當×'+g.bento+'）':'')+(g.note?' — '+g.note:'')).join('\n');
  grps.forEach(([s])=>{
    const list=g2(s);
    if(list.length){txt+='\n\n【'+s+' '+list.length+' 人】\n';txt+=list.map(g=>'• '+g.name+(g.note?' — '+g.note:'')).join('\n');}
  });
  copyToClipboard(txt);
}
function copyToClipboard(txt){
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(()=>showToast('已複製')).catch(()=>fallbackCopy(txt));}
  else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('已複製');}catch(e){showToast('複製失敗');}
  document.body.removeChild(ta);
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
document.getElementById('n-name').addEventListener('keydown',e=>{if(e.key==='Enter')addPerson();});
init();
</script>
