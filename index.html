<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>午餐會 來賓管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E5E0D8;
    --border-strong: #C8C0B4;
    --text: #1A1714;
    --text-muted: #7A7368;
    --text-faint: #B0A89E;
    --accent: #2C5F2E;
    --accent-light: #EAF2EA;
    --red: #8B2020;
    --red-light: #FAF0F0;
    --amber: #7A5500;
    --amber-light: #FDF6E3;
    --blue: #1A3A6B;
    --blue-light: #EEF3FB;
    --purple: #4A1D8B;
    --purple-light: #F0EAFB;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    gap: 10px;
  }

  .logo-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    cursor: pointer;
  }
  .logo-title:hover { text-decoration: underline; }

  .logo-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .sync-status {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }
  .sync-ok   { background: var(--accent-light); color: var(--accent); }
  .sync-err  { background: var(--red-light); color: var(--red); }
  .sync-ing  { background: var(--amber-light); color: var(--amber); }
  .sync-none { background: var(--bg); color: var(--text-faint); border: 1px solid var(--border); }

  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--bg); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1e4420; }
  .btn-danger { color: var(--red); }

  .main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

  /* 設定面板 */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
    display: none;
  }
  .setup-panel.show { display: block; }
  .setup-panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .setup-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .setup-row input {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    flex: 1;
    min-width: 260px;
    outline: none;
  }
  .setup-row input:focus { border-color: var(--border-strong); }
  .setup-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }
  .setup-hint code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 11px; }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
  .stat-card.coming .stat-num { color: var(--accent); }
  .stat-card.bento .stat-num { color: var(--blue); }
  .stat-card.absent .stat-num { color: var(--red); }
  .stat-card.unknown .stat-num { color: var(--amber); }
  .stat-card.asked .stat-num { color: var(--purple); }

  .controls { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

  .filter-group {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .filter-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border: none;
    border-right: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:last-child { border-right: none; }
  .filter-btn:hover { background: var(--bg); color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; }

  .search-box {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    width: 160px;
    outline: none;
  }
  .search-box:focus { border-color: var(--border-strong); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th {
    background: var(--bg);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  td { padding: 8px 12px; vertical-align: middle; font-size: 13px; }

  td input[type=text], td input[type=number] {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text);
    width: 100%;
    transition: all 0.15s;
    outline: none;
  }
  td input[type=text]:hover, td input[type=number]:hover { border-color: var(--border); background: var(--surface); }
  td input[type=text]:focus, td input[type=number]:focus {
    border-color: var(--border-strong);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(44,95,46,0.08);
  }
  td input[type=number] { width: 56px; text-align: center; }
  td input:disabled { opacity: 0.3; pointer-events: none; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .status-badge:hover { opacity: 0.8; }
  .status-badge:active { transform: scale(0.96); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }

  .s-coming { background: var(--accent-light); color: var(--accent); }
  .s-absent  { background: var(--red-light); color: var(--red); }
  .s-unknown { background: var(--amber-light); color: var(--amber); }
  .s-asked   { background: var(--purple-light); color: var(--purple); }

  .del-btn {
    font-size: 11px; padding: 3px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    transition: all 0.15s;
  }
  .del-btn:hover { border-color: var(--red); background: var(--red-light); color: var(--red); }

  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-top: 14px;
  }
  .add-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .add-row input, .add-row select {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-row input:focus, .add-row select:focus { border-color: var(--border-strong); }
  .add-row input.f-name  { width: 90px; }
  .add-row input.f-bento { width: 60px; }
  .add-row input.f-note  { width: 160px; }
  .add-row input.f-phone { width: 130px; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text);
    color: #fff;
    font-size: 13px;
    padding: 9px 18px;
    border-radius: var(--radius);
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 32px; color: var(--text-faint); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-title" onclick="toggleSetup()" title="點此設定">⚙ 午餐會 來賓管理</div>
    <div class="logo-sub">曾獻瑩議員辦公室</div>
  </div>
  <div class="header-actions">
    <span class="sync-status sync-none" id="sync-status">未連線</span>
    <button class="btn" onclick="syncFromSheet()">從雲端載入</button>
    <button class="btn btn-primary" onclick="syncToSheet()">儲存到雲端</button>
    <button class="btn btn-danger" onclick="resetData()">重置</button>
    <button class="btn" onclick="copyText()">複製名單</button>
    <button class="btn" onclick="exportCSV()">匯出 CSV</button>
  </div>
</header>

<div class="main">

  <!-- 設定面板 -->
  <div class="setup-panel" id="setup-panel">
    <h3>⚙ Google Sheets 連線設定</h3>
    <div class="setup-row">
      <input type="text" id="gas-url" placeholder="貼上 Google Apps Script 部署網址">
      <button class="btn btn-primary" onclick="saveGasUrl()">儲存設定</button>
    </div>
    <div class="setup-hint">
      設定步驟：<br>
      1. 開啟 Google Sheets → 擴充功能 → Apps Script<br>
      2. 貼上 <code>lunch_guests.gs</code> 的內容並儲存<br>
      3. 部署 → 新增部署 → 類型選「網頁應用程式」<br>
      4. 執行身分：「我」/ 存取權：「任何人」→ 部署<br>
      5. 複製部署網址，貼到上方欄位
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card coming"><div class="stat-num" id="s-coming">0</div><div class="stat-label">出席人數</div></div>
    <div class="stat-card bento"><div class="stat-num" id="s-bento">0</div><div class="stat-label">便當總數</div></div>
    <div class="stat-card absent"><div class="stat-num" id="s-absent">0</div><div class="stat-label">缺席人數</div></div>
    <div class="stat-card unknown"><div class="stat-num" id="s-unknown">0</div><div class="stat-label">待確認</div></div>
    <div class="stat-card asked"><div class="stat-num" id="s-asked">0</div><div class="stat-label">已詢問</div></div>
  </div>

  <div class="controls">
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('出席',this)">出席</button>
      <button class="filter-btn" onclick="setFilter('缺席',this)">缺席</button>
      <button class="filter-btn" onclick="setFilter('待確認',this)">待確認</button>
      <button class="filter-btn" onclick="setFilter('已詢問',this)">已詢問</button>
    </div>
    <input type="text" class="search-box" id="search" placeholder="搜尋姓名 / 備註..." oninput="render()">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:88px;">姓名</th>
          <th style="width:100px;">狀態</th>
          <th style="width:58px;">便當</th>
          <th>備註</th>
          <th style="width:120px;">電話</th>
          <th style="width:48px;"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="add-section">
    <div class="add-label">新增來賓</div>
    <div class="add-row">
      <input class="f-name" type="text" id="n-name" placeholder="姓名">
      <select id="n-status">
        <option value="出席">出席</option>
        <option value="待確認" selected>待確認</option>
        <option value="已詢問">已詢問</option>
        <option value="缺席">缺席</option>
      </select>
      <input class="f-bento" type="number" id="n-bento" value="1" min="0" max="20">
      <input class="f-note" type="text" id="n-note" placeholder="備註">
      <input class="f-phone" type="text" id="n-phone" placeholder="電話">
      <button class="btn btn-primary" onclick="addPerson()">新增</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── 設定 ──────────────────────────────────────
const LOCAL_KEY  = 'lunch-guests-v2';
const GAS_KEY    = 'lunch-gas-url';

const DEFAULT_GUESTS = [
  {name:"大衛",    status:"待確認", bento:0, note:"", phone:""},
  {name:"彥漢8872",status:"待確認", bento:0, note:"8872值班", phone:"0920-856-700"},
  {name:"秀華",    status:"待確認", bento:0, note:"張淑惠 關崇仁 林湛", phone:""},
  {name:"麗文8815",status:"待確認", bento:0, note:"8815 璊莉 4511", phone:""},
  {name:"雅雯4997",status:"待確認", bento:0, note:"", phone:""},
  {name:"豪雷",    status:"待確認", bento:0, note:"", phone:""},
  {name:"天維",    status:"待確認", bento:0, note:"", phone:""},
  {name:"銓興哥",  status:"待確認", bento:0, note:"", phone:""},
  {name:"關崇仁",  status:"待確認", bento:0, note:"", phone:""},
  {name:"林湛",    status:"待確認", bento:0, note:"", phone:""},
  {name:"吉昇",    status:"待確認", bento:0, note:"", phone:""},
  {name:"莊敬",    status:"待確認", bento:0, note:"", phone:""},
  {name:"美玲",    status:"待確認", bento:0, note:"", phone:""},
  {name:"佳頤",    status:"待確認", bento:0, note:"", phone:""},
  {name:"守愚",    status:"待確認", bento:0, note:"", phone:""},
  {name:"冠禎",    status:"待確認", bento:0, note:"", phone:""},
  {name:"欣美姐",  status:"待確認", bento:0, note:"", phone:""},
  {name:"宗諺",    status:"待確認", bento:0, note:"", phone:""},
  {name:"懿恬",    status:"待確認", bento:0, note:"", phone:""},
  {name:"閔翔",    status:"待確認", bento:0, note:"", phone:""},
  {name:"俊維",    status:"待確認", bento:0, note:"", phone:""},
  {name:"家銘",    status:"待確認", bento:0, note:"", phone:""},
  {name:"鴻華",    status:"待確認", bento:0, note:"", phone:""},
  {name:"世德",    status:"待確認", bento:0, note:"", phone:""},
  {name:"士斌",    status:"待確認", bento:0, note:"", phone:""},
  {name:"政宏",    status:"待確認", bento:0, note:"", phone:""},
  {name:"Cindy姐", status:"待確認", bento:0, note:"", phone:""},
  {name:"淑慧",    status:"待確認", bento:0, note:"", phone:""},
  {name:"黎大哥",  status:"待確認", bento:0, note:"", phone:""},
];

// ── 狀態 ──────────────────────────────────────
let guests = [];
let curFilter = 'all';
let gasUrl = '';

function init() {
  gasUrl = localStorage.getItem(GAS_KEY) || '';
  if (gasUrl) {
    document.getElementById('gas-url').value = gasUrl;
    setSyncStatus('ok', '已設定雲端');
  }
  try {
    const saved = localStorage.getItem(LOCAL_KEY);
    guests = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_GUESTS));
  } catch(e) {
    guests = JSON.parse(JSON.stringify(DEFAULT_GUESTS));
  }
  render();
}

function saveLocal() {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(guests)); } catch(e) {}
}

function saveGasUrl() {
  const val = document.getElementById('gas-url').value.trim();
  if (!val) { showToast('請輸入網址'); return; }
  gasUrl = val;
  localStorage.setItem(GAS_KEY, gasUrl);
  setSyncStatus('ok', '已儲存設定');
  showToast('GAS 網址已儲存');
  document.getElementById('setup-panel').classList.remove('show');
}

function toggleSetup() {
  document.getElementById('setup-panel').classList.toggle('show');
}

// ── 雲端同步 ──────────────────────────────────
function setSyncStatus(type, msg) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status sync-' + type;
  el.textContent = msg;
}

async function syncFromSheet() {
  if (!gasUrl) { showToast('請先設定 GAS 網址（點標題⚙）'); return; }
  setSyncStatus('ing', '載入中...');
  try {
    const res = await fetch(gasUrl + '?action=read');
    const data = await res.json();
    if (data.ok && data.guests.length > 0) {
      guests = data.guests;
      saveLocal();
      render();
      setSyncStatus('ok', '✓ 已從雲端載入');
      showToast(`載入成功，共 ${guests.length} 人`);
    } else {
      setSyncStatus('ok', '雲端無資料');
      showToast('雲端目前沒有資料，使用本機版本');
    }
  } catch(e) {
    setSyncStatus('err', '載入失敗');
    showToast('載入失敗，請確認 GAS 網址是否正確');
  }
}

async function syncToSheet() {
  if (!gasUrl) { showToast('請先設定 GAS 網址（點標題⚙）'); return; }
  setSyncStatus('ing', '儲存中...');
  try {
    const res = await fetch(gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'write', guests })
    });
    const data = await res.json();
    if (data.ok) {
      setSyncStatus('ok', `✓ 已儲存 ${data.count} 人`);
      showToast(`已儲存到 Google Sheets（${data.count} 人）`);
    } else {
      throw new Error(data.error);
    }
  } catch(e) {
    setSyncStatus('err', '儲存失敗');
    showToast('儲存失敗：' + e.message);
  }
}

// ── 資料操作 ───────────────────────────────────
function statusClass(s) {
  if (s === '出席') return 's-coming';
  if (s === '缺席') return 's-absent';
  if (s === '已詢問') return 's-asked';
  return 's-unknown';
}

function cycleStatus(i) {
  const order = ['出席', '缺席', '待確認', '已詢問'];
  guests[i].status = order[(order.indexOf(guests[i].status) + 1) % order.length];
  if (guests[i].status !== '出席') guests[i].bento = 0;
  else if (guests[i].bento === 0) guests[i].bento = 1;
  saveLocal();
  render();
}

function updateField(i, field, val) {
  guests[i][field] = field === 'bento' ? (parseInt(val) || 0) : val;
  saveLocal();
  updateStats();
}

function delPerson(i) {
  if (confirm(`確定刪除「${guests[i].name}」？`)) {
    guests.splice(i, 1);
    saveLocal();
    render();
  }
}

function addPerson() {
  const name = document.getElementById('n-name').value.trim();
  if (!name) { showToast('請輸入姓名'); return; }
  guests.push({
    name,
    status: document.getElementById('n-status').value,
    bento: parseInt(document.getElementById('n-bento').value) || 0,
    note: document.getElementById('n-note').value.trim(),
    phone: document.getElementById('n-phone').value.trim(),
  });
  document.getElementById('n-name').value = '';
  document.getElementById('n-note').value = '';
  document.getElementById('n-phone').value = '';
  document.getElementById('n-bento').value = '1';
  saveLocal();
  showToast(`已新增「${name}」`);
  render();
}

function resetData() {
  if (confirm('確定要重置為原始名單？所有修改都會消失。')) {
    guests = JSON.parse(JSON.stringify(DEFAULT_GUESTS));
    saveLocal();
    render();
    showToast('已重置為原始名單');
  }
}

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── 渲染 ───────────────────────────────────────
function updateStats() {
  const coming = guests.filter(g => g.status === '出席');
  document.getElementById('s-coming').textContent = coming.length;
  document.getElementById('s-bento').textContent = coming.reduce((a, g) => a + g.bento, 0);
  document.getElementById('s-absent').textContent = guests.filter(g => g.status === '缺席').length;
  document.getElementById('s-unknown').textContent = guests.filter(g => g.status === '待確認').length;
  document.getElementById('s-asked').textContent = guests.filter(g => g.status === '已詢問').length;
}

function render() {
  updateStats();
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = guests.map((g, i) => ({...g, _i: i}));
  if (curFilter !== 'all') list = list.filter(g => g.status === curFilter);
  if (q) list = list.filter(g => g.name.toLowerCase().includes(q) || g.note.toLowerCase().includes(q));

  const tb = document.getElementById('tbody');
  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="6" class="empty">沒有符合條件的來賓</td></tr>`;
    return;
  }
  tb.innerHTML = list.map(g => {
    const ri = g._i;
    const sc = statusClass(g.status);
    return `<tr>
      <td><input type="text" value="${esc(g.name)}" onchange="updateField(${ri},'name',this.value)"></td>
      <td><span class="status-badge ${sc}" onclick="cycleStatus(${ri})"><span class="dot"></span>${g.status}</span></td>
      <td><input type="number" value="${g.bento}" min="0" max="20" onchange="updateField(${ri},'bento',this.value)" ${g.status !== '出席' ? 'disabled' : ''}></td>
      <td><input type="text" value="${esc(g.note)}" onchange="updateField(${ri},'note',this.value)"></td>
      <td><input type="text" value="${esc(g.phone)}" onchange="updateField(${ri},'phone',this.value)"></td>
      <td><button class="del-btn" onclick="delPerson(${ri})">刪除</button></td>
    </tr>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── 匯出 ───────────────────────────────────────
function exportCSV() {
  const bom = '\uFEFF';
  const hdr = '姓名,出缺席狀態,便當數量,備註,聯絡電話\n';
  const rows = guests.map(g => `"${g.name}","${g.status}","${g.bento}","${g.note}","${g.phone}"`).join('\n');
  const blob = new Blob([bom + hdr + rows], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '午餐會來賓名單.csv';
  a.click();
  showToast('CSV 匯出成功');
}

function copyText() {
  const coming = guests.filter(g => g.status === '出席');
  const unknown = guests.filter(g => g.status === '待確認');
  const asked = guests.filter(g => g.status === '已詢問');
  const absent = guests.filter(g => g.status === '缺席');
  const bento = coming.reduce((a, g) => a + g.bento, 0);
  let txt = `午餐會來賓名單\n${'─'.repeat(24)}\n`;
  txt += `【出席 ${coming.length} 人 ／ 便當 ${bento} 個】\n`;
  txt += coming.map(g => `• ${g.name}${g.bento > 1 ? `（便當×${g.bento}）` : ''}${g.note ? ' — ' + g.note : ''}`).join('\n');
  if (asked.length) { txt += `\n\n【已詢問 ${asked.length} 人】\n`; txt += asked.map(g => `• ${g.name}${g.note ? ' — ' + g.note : ''}`).join('\n'); }
  if (unknown.length) { txt += `\n\n【待確認 ${unknown.length} 人】\n`; txt += unknown.map(g => `• ${g.name}${g.note ? ' — ' + g.note : ''}`).join('\n'); }
  if (absent.length) { txt += `\n\n【缺席 ${absent.length} 人】\n`; txt += absent.map(g => `• ${g.name}${g.note ? ' — ' + g.note : ''}`).join('\n'); }
  copyToClipboard(txt);
}

function copyToClipboard(txt) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(txt).then(() => showToast('名單已複製到剪貼簿')).catch(() => fallbackCopy(txt));
  } else { fallbackCopy(txt); }
}

function fallbackCopy(txt) {
  const ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('名單已複製到剪貼簿'); }
  catch(e) { showToast('複製失敗，請手動複製'); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('n-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPerson();
});

init();
</script>
